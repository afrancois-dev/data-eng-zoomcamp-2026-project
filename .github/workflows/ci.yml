name: CI - Bruin Pipeline

# trigger on push to production and staging branches, and on pull requests to staging
on:
  push:
    branches:
      - production
      - staging
  pull_request:
    branches:
      - staging
    types: [opened, synchronize, reopened]

env:
  REGION: europe-west1
  ENVIRONMENT: "${{ github.ref_name == 'production' && 'production' || 'staging' }}"
  PROJECT_ID: "mma-stats-${{ github.ref_name == 'production' && 'production' || 'staging' }}"
  IMAGE: mma-stats

jobs:
  validate-and-build:
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'production' && 'production' || 'staging' }}
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. build (only locally for now, we push later if tests pass)
      - name: Google Auth
        id: auth
        uses: google-github-actions/auth@v2
        with:
          token_format: access_token
          workload_identity_provider: ${{ secrets.GCP_WID_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - name: Docker Auth
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Build Docker Image
        run: |
          docker build -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.IMAGE }}/${{ env.IMAGE }}:${{ github.sha }} .

      # 2. validation inside docker (ruff, yaml, bruin)
      - name: Linting & Formatting Check (Ruff inside Docker)
        run: |
          docker run --rm \
            --entrypoint /bin/sh \
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.IMAGE }}/${{ env.IMAGE }}:${{ github.sha }} \
            -c "uv run ruff check ."

      - name: Bruin Format & Validate (inside Docker)
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/app \
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.IMAGE }}/${{ env.IMAGE }}:${{ github.sha }} \
            format --sqlfluff --fail-if-changed .
          docker run --rm \
            -v ${{ github.workspace }}:/app \
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.IMAGE }}/${{ env.IMAGE }}:${{ github.sha }} \
            validate .

      # 3. push image if all validations pass
      - name: Push Docker Image
        run: |
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.IMAGE }}/${{ env.IMAGE }}:${{ github.sha }}
          docker tag ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.IMAGE }}/${{ env.IMAGE }}:${{ github.sha }} ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.IMAGE }}/${{ env.IMAGE }}:latest
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.IMAGE }}/${{ env.IMAGE }}:latest

  deploy:
    needs: validate-and-build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref_name == 'production' || github.ref_name == 'staging')
    environment: ${{ github.ref_name == 'production' && 'production' || 'staging' }}
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Google Auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WID_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - name: Deploy Cloud Run Job
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          job: mma-stats-pipeline
          image: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.IMAGE }}/${{ env.IMAGE }}:${{ github.sha }}
          region: ${{ env.REGION }}

